<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Morning Feed</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #06090d;
  --bg2:       #0a0f16;
  --bg3:       #0d1520;
  --border:    #111d2a;
  --border2:   #182840;
  --text:      #b8c8d8;
  --text-dim:  #3a5570;
  --text-mid:  #6a8aaa;
  --bright:    #dce8f6;
  --accent:    #4a8ff0;
  --gold:      #d4b878;
  --red:       #e04040;
  --green:     #3a9a5c;
  --mono:      'IBM Plex Mono', 'Courier New', monospace;
  --sans:      'IBM Plex Sans', system-ui, sans-serif;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  -webkit-font-smoothing: antialiased;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ────────────────────────────────────────────
   GATE
   ──────────────────────────────────────────── */
#gate {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  gap: 28px;
  padding: 32px;
  background:
    radial-gradient(ellipse 60% 40% at 50% 0%, rgba(74,143,240,0.04) 0%, transparent 70%),
    var(--bg);
}

.gate-wordmark {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
.gate-wordmark-text {
  font-size: 11px;
  letter-spacing: 7px;
  color: var(--gold);
  font-weight: 500;
}
.gate-wordmark-dot {
  width: 5px; height: 5px;
  background: var(--accent);
  border-radius: 50%;
  animation: pulse 2.5s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.4; transform: scale(1); }
  50%       { opacity: 1;   transform: scale(1.3); }
}

#gate-input {
  background: var(--bg2);
  border: 1px solid var(--border2);
  color: var(--bright);
  font-family: var(--mono);
  font-size: 15px;
  padding: 13px 20px;
  text-align: center;
  letter-spacing: 4px;
  outline: none;
  width: 240px;
  border-radius: 4px;
  transition: border-color 0.2s;
  -webkit-text-security: disc;
}
#gate-input:focus { border-color: var(--accent); }

#gate-error {
  font-size: 9px;
  color: var(--red);
  letter-spacing: 2px;
  height: 12px;
  text-align: center;
  text-transform: uppercase;
}

/* ────────────────────────────────────────────
   MAIN FEED
   ──────────────────────────────────────────── */
#feed {
  display: none;
  max-width: 640px;
  margin: 0 auto;
  padding-bottom: 80px;
}

/* ── Sticky header ── */
#feed-header {
  position: sticky;
  top: 0;
  z-index: 20;
  background: rgba(6, 9, 13, 0.92);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header-left {
  display: flex;
  align-items: center;
  gap: 10px;
}
.header-dot {
  width: 5px; height: 5px;
  background: var(--accent);
  border-radius: 50%;
  animation: pulse 2.5s ease-in-out infinite;
}
.header-title {
  font-size: 9px;
  letter-spacing: 5px;
  color: var(--gold);
  font-weight: 500;
}
.header-date {
  font-size: 8px;
  color: var(--text-dim);
  letter-spacing: 1px;
}

#timer {
  font-size: 16px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 2px;
  font-variant-numeric: tabular-nums;
  transition: color 0.5s;
}
#timer.warning { color: var(--gold); }
#timer.urgent  { color: var(--red); animation: tick 1s steps(1) infinite; }
@keyframes tick { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

/* ── Section label ── */
.section-label {
  padding: 18px 16px 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-label-text {
  font-size: 8px;
  color: var(--text-dim);
  letter-spacing: 3.5px;
  text-transform: uppercase;
}
.section-label-line {
  flex: 1;
  height: 1px;
  background: var(--border);
}
.section-count {
  font-size: 8px;
  color: var(--border2);
  letter-spacing: 1px;
}

/* ── Loading/error ── */
.status-row {
  padding: 20px 16px;
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 2px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.spinner {
  width: 10px; height: 10px;
  border: 1.5px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ────────────────────────────────────────────
   NEWS ITEMS
   ──────────────────────────────────────────── */
.news-item {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  position: relative;
  transition: background 0.15s;
}
.news-item:active { background: var(--bg2); }

.news-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 5px;
}
.news-source {
  font-size: 7.5px;
  color: var(--accent);
  letter-spacing: 2.5px;
  text-transform: uppercase;
  font-weight: 500;
}
.news-dot {
  width: 2px; height: 2px;
  background: var(--border2);
  border-radius: 50%;
}
.news-date {
  font-size: 7.5px;
  color: var(--text-dim);
  letter-spacing: 0.5px;
}

.news-title {
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 500;
  color: var(--bright);
  line-height: 1.5;
  text-decoration: none;
  display: block;
  margin-bottom: 6px;
}
.news-title:visited { color: var(--text-mid); }

.news-desc {
  font-family: var(--sans);
  font-size: 12px;
  color: var(--text-mid);
  line-height: 1.65;
  font-weight: 300;
}

/* ────────────────────────────────────────────
   YOUTUBE ITEMS
   ──────────────────────────────────────────── */
.yt-item {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
}

.yt-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}
.yt-channel {
  font-size: 7.5px;
  color: var(--red);
  letter-spacing: 2.5px;
  text-transform: uppercase;
  font-weight: 500;
}
.yt-date {
  font-size: 7.5px;
  color: var(--text-dim);
  letter-spacing: 0.5px;
}

.yt-title {
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  color: var(--bright);
  line-height: 1.5;
  margin-bottom: 10px;
}

.yt-embed-wrap {
  width: 100%;
  aspect-ratio: 16 / 9;
  background: var(--bg3);
  border-radius: 4px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.yt-embed-wrap iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}

.yt-desc {
  font-family: var(--sans);
  font-size: 11px;
  color: var(--text-mid);
  line-height: 1.6;
  margin-top: 8px;
  font-weight: 300;
}

/* ────────────────────────────────────────────
   OVERLAY
   ──────────────────────────────────────────── */
#overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 50;
  background:
    radial-gradient(ellipse 80% 60% at 50% 50%, rgba(74,143,240,0.04) 0%, transparent 70%),
    rgba(4, 7, 11, 0.97);
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  padding: 32px;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  animation: fadeIn 0.4s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
#overlay.visible { display: flex; }

.overlay-label {
  font-size: 8px;
  color: var(--text-dim);
  letter-spacing: 5px;
  text-transform: uppercase;
}
#overlay-code {
  font-size: 20px;
  color: var(--gold);
  letter-spacing: 5px;
  font-weight: 700;
}
#overlay-input {
  background: var(--bg2);
  border: 1px solid var(--border2);
  color: var(--bright);
  font-family: var(--mono);
  font-size: 16px;
  padding: 13px 20px;
  text-align: center;
  letter-spacing: 5px;
  outline: none;
  width: 280px;
  border-radius: 4px;
  text-transform: uppercase;
  transition: border-color 0.2s;
}
#overlay-input:focus { border-color: var(--accent); }
#overlay-input.matched { border-color: var(--green); color: var(--green); }

.overlay-hint {
  font-size: 8px;
  color: var(--border2);
  letter-spacing: 1.5px;
  text-align: center;
}
</style>
</head>
<body>

<!-- ── PASSWORD GATE ── -->
<div id="gate">
  <div class="gate-wordmark">
    <div class="gate-wordmark-dot"></div>
    <div class="gate-wordmark-text">MORNING · FEED</div>
  </div>
  <input
    type="password"
    id="gate-input"
    placeholder="·  ·  ·  ·  ·  ·  ·  ·"
    autocomplete="off"
    autocorrect="off"
    spellcheck="false"
    autofocus
  >
  <div id="gate-error"></div>
</div>

<!-- ── MAIN FEED ── -->
<div id="feed">
  <div id="feed-header">
    <div class="header-left">
      <div class="header-dot"></div>
      <div class="header-title">MORNING·FEED</div>
      <div class="header-date" id="header-date"></div>
    </div>
    <div id="timer">10:00</div>
  </div>

  <div class="section-label">
    <span class="section-label-text">News</span>
    <span class="section-label-line"></span>
    <span class="section-count" id="news-count"></span>
  </div>
  <div id="news-container">
    <div class="status-row"><div class="spinner"></div>fetching feeds…</div>
  </div>

  <div class="section-label">
    <span class="section-label-text">YouTube</span>
    <span class="section-label-line"></span>
    <span class="section-count" id="yt-count"></span>
  </div>
  <div id="yt-container">
    <div class="status-row"><div class="spinner"></div>fetching channels…</div>
  </div>
</div>

<!-- ── TIME'S UP OVERLAY ── -->
<div id="overlay">
  <div class="overlay-label">time's up</div>
  <div id="overlay-code"></div>
  <input
    type="text"
    id="overlay-input"
    placeholder="type code to continue"
    autocomplete="off"
    autocorrect="off"
    spellcheck="false"
    maxlength="12"
  >
  <div class="overlay-hint">type the code above to keep reading</div>
</div>

<script>
// ═══════════════════════════════════════════════
//  CONFIG — edit these values
// ═══════════════════════════════════════════════
const CONFIG = {

  password: "morning",       // ← change this before deploying

  timerSeconds: 600,         // 10 minutes

  maxNewsPerFeed: 4,         // items shown per news source
  maxYoutubePerChannel: 2,   // videos shown per channel

  // ── News RSS feeds ──
  // Find RSS URLs for most outlets at: https://www.rsslookup.com
  newsFeeds: [
    { label: "BBC World",       url: "https://feeds.bbci.co.uk/news/world/rss.xml" },
    { label: "Reuters",         url: "https://feeds.reuters.com/reuters/topNews" },
    { label: "Index.hu",        url: "https://index.hu/24ora/rss/" },
    { label: "444.hu",          url: "https://444.hu/feed" },
    // { label: "Your Source",  url: "https://example.com/rss.xml" },
  ],

  // ── YouTube channels ──
  // Get channel ID: go to channel page → view source → search for "channelId"
  // Or use: https://commentpicker.com/youtube-channel-id.php
  youtubeFeeds: [
    { label: "Kurzgesagt",      channelId: "UCsXVk37bltHxD1rDPwtNM8Q" },
    { label: "Lex Fridman",     channelId: "UCSHZKyawb77ixDdsGog4iWA" },
    // { label: "Your Channel", channelId: "UC..." },
  ],

};
// ═══════════════════════════════════════════════

// ── CORS proxy ──
// corsproxy.io returns raw response body — no JSON wrapper needed
const proxy = url => `https://corsproxy.io/?${encodeURIComponent(url)}`;

// ── Helpers ──
const $ = id => document.getElementById(id);

function parseXML(str) {
  return new DOMParser().parseFromString(str, "text/xml");
}

function stripTags(str = "") {
  return str
    .replace(/<[^>]*>/g, " ")
    .replace(/&amp;/g, "&").replace(/&lt;/g, "<")
    .replace(/&gt;/g, ">").replace(/&quot;/g, '"')
    .replace(/&#39;/g, "'").replace(/&nbsp;/g, " ")
    .replace(/\s+/g, " ").trim();
}

function truncate(str, max = 180) {
  const s = stripTags(str);
  return s.length > max ? s.slice(0, max - 1) + "…" : s;
}

function fmtDate(raw = "") {
  if (!raw) return "";
  const d = new Date(raw);
  if (isNaN(d)) return "";
  const now = new Date();
  const diffH = (now - d) / 3600000;
  if (diffH < 1)   return `${Math.round(diffH * 60)}m ago`;
  if (diffH < 24)  return `${Math.round(diffH)}h ago`;
  return d.toLocaleDateString("en-GB", { day: "numeric", month: "short" });
}

function generateCode(len = 12) {
  const pool = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  return Array.from({ length: len }, () => pool[Math.floor(Math.random() * pool.length)]).join("");
}

// ── Fetch XML via proxy ──
async function fetchXML(url) {
  const res = await fetch(proxy(url), { signal: AbortSignal.timeout(10000) });
  const text = await res.text();
  return parseXML(text);
}

// ── Parse news feed (RSS 2.0 and Atom) ──
async function fetchNews(feed) {
  const doc = await fetchXML(feed.url);
  const items = [];
  const max = CONFIG.maxNewsPerFeed;

  // RSS 2.0
  const rssItems = [...doc.querySelectorAll("item")];
  if (rssItems.length) {
    rssItems.slice(0, max).forEach(el => {
      const link = el.querySelector("link")?.textContent?.trim()
                || el.querySelector("link")?.getAttribute("href") || "";
      items.push({
        title:  stripTags(el.querySelector("title")?.textContent || ""),
        link,
        desc:   el.querySelector("description")?.textContent || "",
        date:   el.querySelector("pubDate")?.textContent || "",
        source: feed.label,
      });
    });
    return items;
  }

  // Atom
  const entries = [...doc.querySelectorAll("entry")];
  entries.slice(0, max).forEach(el => {
    const link = el.querySelector("link[rel='alternate']")?.getAttribute("href")
              || el.querySelector("link")?.getAttribute("href") || "";
    items.push({
      title:  stripTags(el.querySelector("title")?.textContent || ""),
      link,
      desc:   el.querySelector("summary")?.textContent
           || el.querySelector("content")?.textContent || "",
      date:   el.querySelector("updated")?.textContent
           || el.querySelector("published")?.textContent || "",
      source: feed.label,
    });
  });
  return items;
}

// ── Parse YouTube Atom feed ──
async function fetchYoutube(feed) {
  const url = `https://www.youtube.com/feeds/videos.xml?channel_id=${feed.channelId}`;
  const doc = await fetchXML(url);
  const entries = [...doc.querySelectorAll("entry")];
  const items = [];
  const max = CONFIG.maxYoutubePerChannel;
  const ytNS = "http://www.youtube.com/xml/schemas/2015";
  const mrssNS = "http://search.yahoo.com/mrss/";

  entries.slice(0, max).forEach(el => {
    // Video ID
    let videoId = el.getElementsByTagNameNS(ytNS, "videoId")[0]?.textContent || "";
    if (!videoId) {
      const href = el.querySelector("link")?.getAttribute("href") || "";
      const m = href.match(/[?&]v=([^&]+)/);
      videoId = m ? m[1] : "";
    }

    // Description from media:description
    const desc = el.getElementsByTagNameNS(mrssNS, "description")[0]?.textContent
              || el.querySelector("summary")?.textContent || "";

    items.push({
      videoId,
      title:   stripTags(el.querySelector("title")?.textContent || ""),
      desc,
      channel: feed.label,
      date:    el.querySelector("published")?.textContent || "",
    });
  });
  return items;
}

// ── Render news ──
function renderNews(items) {
  const el = $("news-container");
  $("news-count").textContent = `${items.length} items`;
  if (!items.length) {
    el.innerHTML = '<div class="status-row">no items loaded</div>';
    return;
  }
  el.innerHTML = items.map(item => `
    <div class="news-item">
      <div class="news-meta">
        <span class="news-source">${item.source}</span>
        ${item.date ? `<span class="news-dot"></span><span class="news-date">${fmtDate(item.date)}</span>` : ""}
      </div>
      <a class="news-title" href="${item.link}" target="_blank" rel="noopener noreferrer">${item.title}</a>
      ${item.desc ? `<div class="news-desc">${truncate(item.desc)}</div>` : ""}
    </div>
  `).join("");
}

// ── Render YouTube ──
function renderYoutube(items) {
  const el = $("yt-container");
  $("yt-count").textContent = `${items.length} videos`;
  if (!items.length) {
    el.innerHTML = '<div class="status-row">no videos loaded</div>';
    return;
  }
  el.innerHTML = items.map(item => `
    <div class="yt-item">
      <div class="yt-meta">
        <span class="yt-channel">${item.channel}</span>
        ${item.date ? `<span class="news-dot"></span><span class="yt-date">${fmtDate(item.date)}</span>` : ""}
      </div>
      <div class="yt-title">${item.title}</div>
      ${item.videoId ? `
        <div class="yt-embed-wrap">
          <iframe
            src="https://www.youtube.com/embed/${item.videoId}?rel=0&modestbranding=1"
            allowfullscreen
            loading="lazy"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          ></iframe>
        </div>` : ""}
      ${item.desc ? `<div class="yt-desc">${truncate(item.desc, 120)}</div>` : ""}
    </div>
  `).join("");
}

// ── Load all feeds ──
async function loadFeeds() {
  // News
  const newsResults = await Promise.allSettled(CONFIG.newsFeeds.map(fetchNews));
  const allNews = newsResults
    .filter(r => r.status === "fulfilled")
    .flatMap(r => r.value);
  renderNews(allNews);

  // YouTube
  const ytResults = await Promise.allSettled(CONFIG.youtubeFeeds.map(fetchYoutube));
  const allYt = ytResults
    .filter(r => r.status === "fulfilled")
    .flatMap(r => r.value);
  renderYoutube(allYt);
}

// ── Timer ──
let timerHandle = null;
let unlockCode = "";

function startTimer(seconds = CONFIG.timerSeconds) {
  let remaining = seconds;
  const el = $("timer");

  function tick() {
    remaining--;
    const m = Math.floor(remaining / 60);
    const s = remaining % 60;
    el.textContent = `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
    el.className = remaining <= 60 ? "urgent" : remaining <= 120 ? "warning" : "";

    if (remaining <= 0) { showOverlay(); return; }
    timerHandle = setTimeout(tick, 1000);
  }

  clearTimeout(timerHandle);
  tick();
}

function showOverlay() {
  unlockCode = generateCode(12);
  $("overlay-code").textContent = unlockCode;
  $("overlay-input").value = "";
  $("overlay-input").className = "";
  $("overlay").classList.add("visible");
  setTimeout(() => $("overlay-input").focus(), 100);
}

$("overlay-input").addEventListener("input", function() {
  const val = this.value.toUpperCase();
  this.value = val;
  if (val === unlockCode) {
    this.classList.add("matched");
    setTimeout(() => {
      $("overlay").classList.remove("visible");
      this.classList.remove("matched");
      this.value = "";
      startTimer(); // full reset
    }, 300);
  }
});

// ── Gate ──
$("gate-input").addEventListener("keydown", function(e) {
  if (e.key !== "Enter") return;
  if (this.value === CONFIG.password) {
    $("gate").style.display = "none";
    $("feed").style.display = "block";

    // Header date
    $("header-date").textContent = new Date().toLocaleDateString("en-GB", {
      weekday: "short", day: "numeric", month: "short"
    }).toUpperCase();

    loadFeeds();
    startTimer();
  } else {
    $("gate-error").textContent = "incorrect";
    this.value = "";
    setTimeout(() => $("gate-error").textContent = "", 2000);
  }
});

// ── Gate: also allow mobile keyboard submit (some don't fire Enter) ──
$("gate-input").addEventListener("change", function() {
  this.dispatchEvent(new KeyboardEvent("keydown", { key: "Enter" }));
});
</script>
</body>
</html>
