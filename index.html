<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Morning Feed</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- PASSWORD GATE -->
  <div id="gate">
    <div class="gate-wordmark">
      <div class="gate-wordmark-dot"></div>
      <div class="gate-wordmark-text">MORNING · FEED</div>
    </div>
    <input
      type="password"
      id="gate-input"
      placeholder="·  ·  ·  ·  ·  ·  ·  ·"
      autocomplete="off"
      autocorrect="off"
      spellcheck="false"
      autofocus
    >
    <div id="gate-error"></div>
  </div>

  <!-- MAIN FEED -->
  <div id="feed">

    <div id="feed-header">
      <div class="header-left">
        <div class="header-dot"></div>
        <div class="header-title">MORNING·FEED</div>
        <div class="header-date" id="header-date"></div>
      </div>
      <div id="timer">10:00</div>
    </div>

    <div class="section-label">
      <span class="section-label-text">News</span>
      <span class="section-label-line"></span>
      <span class="section-count" id="news-count"></span>
    </div>
    <div id="news-container">
      <div class="status-row"><div class="spinner"></div>fetching feeds…</div>
    </div>

    <div class="section-label">
      <span class="section-label-text">YouTube</span>
      <span class="section-label-line"></span>
      <span class="section-count" id="yt-count"></span>
    </div>
    <div id="yt-container">
      <div class="status-row"><div class="spinner"></div>fetching channels…</div>
    </div>

  </div>

  <!-- TIME'S UP OVERLAY -->
  <div id="overlay">
    <div class="overlay-label">time's up</div>
    <div id="overlay-code"></div>
    <input
      type="text"
      id="overlay-input"
      placeholder="type code to continue"
      autocomplete="off"
      autocorrect="off"
      spellcheck="false"
      maxlength="12"
    >
    <div class="overlay-hint">
      type the code above to reset the timer<br>
      closing and reopening counts as a new unlock
    </div>
  </div>

  <!-- config.js must load before app.js -->
  <script src="config.js"></script>
  <script src="app.js"></script>

</body>
</html>
