<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Morning Feed</title>
  <!-- Favicon: bold yellow F -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%2306090d'/%3E%3Ctext x='6' y='26' font-family='Georgia,serif' font-size='26' font-weight='700' fill='%23d4b878'%3EF%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- PASSWORD GATE -->
  <div id="gate">
    <div class="gate-wordmark">
      <div class="gate-wordmark-dot"></div>
      <div class="gate-wordmark-text">MORNING · FEED</div>
    </div>
    <input
      type="password"
      id="gate-input"
      placeholder="·  ·  ·  ·  ·  ·  ·  ·"
      autocomplete="off"
      autocorrect="off"
      spellcheck="false"
      autofocus
    >
    <div id="gate-error"></div>
  </div>

  <!-- MAIN FEED -->
  <div id="feed">

    <div id="feed-header">
      <div class="header-left">
        <div class="header-dot"></div>
        <div class="header-title">MORNING·FEED</div>
        <div class="header-date" id="header-date"></div>
      </div>
      <div id="timer">10:00</div>
    </div>

    <div class="section-label">
      <span class="section-label-text">News</span>
      <span class="section-label-line"></span>
      <span class="section-count" id="news-count"></span>
    </div>
    <div id="news-container">
      <div class="status-row"><div class="spinner"></div>fetching feeds…</div>
    </div>

    <div class="section-label">
      <span class="section-label-text">YouTube</span>
      <span class="section-label-line"></span>
      <span class="section-count" id="yt-count"></span>
    </div>
    <div id="yt-container">
      <div class="status-row"><div class="spinner"></div>fetching channels…</div>
    </div>

  </div>

  <!-- TIME'S UP OVERLAY — no dismiss, reload to get back in -->
  <div id="overlay">
    <div class="overlay-label">time's up</div>
    <div class="overlay-sub">come back tomorrow</div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>

</body>
</html>
